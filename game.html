<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP BINGO - LIVE GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1540;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .stat-box { background-color: #251f5c; padding: 8px 1px; border-radius: 8px; font-size: 10px; font-weight: bold; border: 1px solid #3d3580; }
        .stat-val { color: #ffc107; font-size: 12px; margin-top: 3px; }
        .game-layout { display: flex; gap: 10px; justify-content: center; align-items: flex-start; }
        .called-board { background-color: #251f5c; border-radius: 12px; padding: 8px; width: 45%; border: 1px solid #3d3580; }
        .board-column { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .board-cell { background-color: #3d3580; border-radius: 4px; font-size: 11px; font-weight: bold; padding: 6px 0; }
        .board-cell.active-now { background-color: #00c853 !important; }
        .board-cell.active-past { background-color: #ff5722 !important; }
        .right-panel { width: 50%; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .big-ball-container { background-color: #251f5c; width: 100%; padding: 15px 0; border-radius: 12px; border: 1px solid #3d3580; }
        .big-ball { background: white; color: #251f5c; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 4px solid #ffc107; margin: 0 auto; }
        .cartel-box { background: #251f5c; border-radius: 12px; padding: 10px; width: 100%; border: 1px solid #3d3580; box-sizing: border-box; }
        .bingo-table { width: 100%; border-collapse: separate; border-spacing: 3px; }
        .bingo-th { font-size: 12px; padding: 5px 0; border-radius: 3px; }
        .bingo-td { background-color: #ffffff; color: #333; font-weight: bold; padding: 8px 0; border-radius: 3px; font-size: 12px; }
        .bingo-td.matched { background-color: #00c853 !important; color: white !important; }
        .star-cell { background-color: #00c853; color: white; }
        .bingo-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26, 21, 64, 0.95); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .announcement-box { background: #251f5c; padding: 20px; border-radius: 15px; border: 2px solid #ff9800; width: 85%; max-width: 320px; }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="stat-box">GAME ID<div class="stat-val">VIP-102</div></div>
        <div class="stat-box">PLAYERS<div class="stat-val" id="live-players">0</div></div>
        <div class="stat-box">WALLET<div class="stat-val" id="my-wallet">100 ETB</div></div>
        <div class="stat-box">DERASH<div class="stat-val" id="live-prize">0 ETB</div></div>
        <div class="stat-box">CALLED<div class="stat-val" id="called-count">0</div></div>
    </div>

    <div class="game-layout">
        <div class="called-board"><div class="board-column" id="numbers-grid"></div></div>
        <div class="right-panel">
            <div class="big-ball-container"><div class="big-ball" id="current-ball">--</div></div>
            <div class="cartel-box">
                <div style="font-size: 11px; color: #ff9800; margin-bottom: 5px; font-weight: bold;" id="live-cartel-label">CARTELA #--</div>
                <table class="bingo-table">
                    <tr>
                        <th class="bingo-th" style="background:#007bff;">B</th>
                        <th class="bingo-th" style="background:#6f42c1;">I</th>
                        <th class="bingo-th" style="background:#e83e8c;">N</th>
                        <th class="bingo-th" style="background:#28a745;">G</th>
                        <th class="bingo-th" style="background:#fd7e14;">O</th>
                    </tr>
                    <tbody id="cartel-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="bingo-overlay" id="bingo-screen">
        <div class="announcement-box">
            <h1 style="color: #00c853; margin: 0 0 10px 0; font-size: 36px;">BINGO! 🎉</h1>
            <p style="font-size: 16px; margin: 5px 0;">የአሸናፊነት አይነት፡ <span id="win-type" style="color: #ff5722; font-weight: bold;">-</span></p>
            <p style="font-size: 18px; margin: 5px 0;">አሸናፊ፡ <span id="winner-name" style="color: #ffc107; font-weight: bold;">-</span></p>
            <p style="font-size: 16px; margin: 5px 0; color: #007bff;">አሸናፊ ካርዴላ፦ <span id="winner-card-num" style="font-weight: bold;">-</span></p>
            <table class="bingo-table" style="margin-top: 10px;"><tbody id="winner-card-body"></tbody></table>
            <p style="font-size: 12px; color: #ff9800; margin-top: 15px;" id="restart-timer">በ 10 ሰከንድ ውስጥ ወደ ካርድ ምርጫ ይመለሳል...</p>
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        let telegramUser = Telegram.WebApp.initDataUnsafe?.user;
        let playerDisplayName = telegramUser ? (telegramUser.first_name) : null;

        const numbersGrid = document.getElementById('numbers-grid');
        for (let i = 1; i <= 75; i++) {
            const cell = document.createElement('div');
            cell.className = 'board-cell';
            cell.innerText = i;
            cell.id = `board-num-${i}`;
            numbersGrid.appendChild(cell);
        }

        const savedCardNum = localStorage.getItem('selectedCardNum') || '1';
        const savedCardData = localStorage.getItem('selectedCardData');
        
        document.getElementById('live-cartel-label').innerText = `CARTELA #${savedCardNum}`;
        const cartelBody = document.getElementById('cartel-body');
        
        if(savedCardData) {
            cartelBody.innerHTML = savedCardData;
        }

        if (!playerDisplayName) {
            playerDisplayName = `ተጫዋች`;
        }

        // 💰 የዋሌት ማስተካከያ (ጨዋታው ሲጀመር 10 ብር ይቀንሳል)
        let currentWallet = 100 - 10; 
        document.getElementById('my-wallet').innerText = currentWallet + " ETB";

        // 👥 የተጫዋቾች ብዛት እና የደራሽ ስሌት (በ 8 ብር ተባዝቶ)
        let activePlayersCount = Math.floor(Math.random() * (120 - 40 + 1)) + 40; 
        let currentPrizePool = activePlayersCount * 8; // ጠቅላላ ተጫዋቾች በ 8 ብር ሲባዙ
        document.getElementById('live-players').innerText = activePlayersCount;
        document.getElementById('live-prize').innerText = currentPrizePool + " ETB";

        let allNumbers = Array.from({length: 75}, (_, i) => i + 1);
        let calledNumbers = [];
        let currentActiveNum = null;

        // ⏱️ እያንዳንዱ ቁጥር በ 3 ሰከንድ ልዩነት እንዲጠራ የተደረገ (3000ms)
        const callInterval = setInterval(() => {
            if (allNumbers.length === 0) { clearInterval(callInterval); return; }
            const randomIndex = Math.floor(Math.random() * allNumbers.length);
            const pickedNum = allNumbers.splice(randomIndex, 1)[0];
            calledNumbers.push(pickedNum);
            document.getElementById('called-count').innerText = calledNumbers.length;

            if (currentActiveNum) document.getElementById(`board-num-${currentActiveNum}`).className = 'board-cell active-past';
            currentActiveNum = pickedNum;
            document.getElementById('current-ball').innerText = pickedNum;
            document.getElementById(`board-num-${pickedNum}`).className = 'board-cell active-now';
            
            checkAndMatchCard(pickedNum);
        }, 3000);

        function checkAndMatchCard(num) {
            const cells = cartelBody.getElementsByTagName('td');
            for (let cell of cells) {
                if (parseInt(cell.innerText) === num) {
                    cell.classList.add('matched');
                }
            }
            checkWinConditions();
        }

        function isCellMarked(r, c) {
            const row = cartelBody.getElementsByTagName('tr')[r];
            if(!row) return false;
            const cell = row.getElementsByTagName('td')[c];
            if(!cell) return false;
            if (cell.innerText === '★') return true;
            return cell.classList.contains('matched');
        }

        function checkWinConditions() {
            for (let r = 0; r < 5; r++) {
                if (isCellMarked(r,0) && isCellMarked(r,1) && isCellMarked(r,2) && isCellMarked(r,3) && isCellMarked(r,4)) { triggerBingoWin("Horizontal (አግድም)"); return; }
            }
            for (let c = 0; c < 5; c++) {
                if (isCellMarked(0,c) && isCellMarked(1,c) && isCellMarked(2,c) && isCellMarked(3,c) && isCellMarked(4,c)) { triggerBingoWin("Vertical (ወደታች)"); return; }
            }
            if (isCellMarked(0,0) && isCellMarked(1,1) && isCellMarked(2,2) && isCellMarked(3,3) && isCellMarked(4,4)) { triggerBingoWin("Diagonal (ሰያፍ)"); return; }
            if (isCellMarked(0,4) && isCellMarked(1,3) && isCellMarked(2,2) && isCellMarked(3,1) && isCellMarked(4,0)) { triggerBingoWin("Diagonal (ሰያፍ)"); return; }
            if (isCellMarked(0,0) && isCellMarked(0,4) && isCellMarked(4,0) && isCellMarked(4,4)) { triggerBingoWin("4 Corners (ማዕዘናት)"); return; }
        }

        function triggerBingoWin(winType) {
            clearInterval(callInterval);
            
            // 💸 አሸናፊው ሲያሸንፍ የደራሹ ገንዘብ በቀጥታ ዋሌቱ ላይ እንዲደመር ማድረጊያ
            currentWallet = currentWallet + currentPrizePool;
            document.getElementById('my-wallet').innerText = currentWallet + " ETB";

            document.getElementById('bingo-screen').style.display = 'flex';
            document.getElementById('win-type').innerText = winType;
            document.getElementById('winner-name').innerText = playerDisplayName; 
            document.getElementById('winner-card-num').innerText = `#${savedCardNum}`; 
            document.getElementById('winner-card-body').innerHTML = cartelBody.innerHTML;
            
            let returnTime = 10;
            const returnInterval = setInterval(() => {
                returnTime--;
                document.getElementById('restart-timer').innerText = `በ ${returnTime} ሰከንድ ውስጥ ወደ ካርድ ምርጫ ይመለሳል...`;
                if (returnTime <= 0) {
                    clearInterval(returnInterval);
                    window.location.href = 'index.html'; 
                }
            }, 1000);
        }
    </script>
</body>
</html>
