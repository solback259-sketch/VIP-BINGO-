<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP BINGO - LIVE GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1540; color: white; margin: 0; padding: 10px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .stat-box { background-color: #251f5c; padding: 8px 1px; border-radius: 8px; font-size: 10px; font-weight: bold; border: 1px solid #3d3580; }
        .stat-val { color: #ffc107; font-size: 12px; margin-top: 3px; }
        .game-layout { display: flex; gap: 10px; justify-content: center; align-items: flex-start; }
        .called-board { background-color: #251f5c; border-radius: 12px; padding: 8px; width: 45%; border: 1px solid #3d3580; }
        .board-column { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .board-cell { background-color: #3d3580; border-radius: 4px; font-size: 11px; font-weight: bold; padding: 6px 0; }
        .board-cell.active-now { background-color: #00c853 !important; }
        .board-cell.active-past { background-color: #ff5722 !important; }
        .right-panel { width: 50%; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .big-ball-container { background-color: #251f5c; width: 100%; padding: 15px 0; border-radius: 12px; border: 1px solid #3d3580; }
        .big-ball { background: white; color: #251f5c; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 4px solid #ffc107; margin: 0 auto; }
        .cartel-box { background: #251f5c; border-radius: 12px; padding: 10px; width: 100%; border: 1px solid #3d3580; box-sizing: border-box; }
        .bingo-table { width: 100%; border-collapse: separate; border-spacing: 3px; }
        .bingo-th { font-size: 12px; padding: 5px 0; border-radius: 3px; position: relative; }
        
        /* 📍 የካርቴላ ቁጥር በ 5ኛው ፊደል (O) ላይ እንዲሆን ማድረጊያ ስታይል */
        .cartela-label-top { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #ff9800; font-weight: bold; white-space: nowrap; }
        
        .bingo-td { background-color: #ffffff; color: #333; font-weight: bold; padding: 8px 0; border-radius: 3px; font-size: 12px; }
        .bingo-td.matched { background-color: #00c853 !important; color: white !important; }
        .bingo-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26, 21, 64, 0.95); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .announcement-box { background: #251f5c; padding: 20px; border-radius: 15px; border: 2px solid #ffc107; width: 85%; max-width: 320px; }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="stat-box">GAME ID<div class="stat-val">VIP-102</div></div>
        <div class="stat-box">PLAYERS<div class="stat-val" id="live-players">1</div></div>
        <div class="stat-box">WALLET<div class="stat-val" id="my-wallet">-- ETB</div></div>
        <div class="stat-box">DERASH<div class="stat-val" id="live-prize">0 ETB</div></div>
        <div class="stat-box">CALLED<div class="stat-val" id="called-count">0</div></div>
    </div>

    <div class="game-layout">
        <div class="called-board"><div class="board-column" id="numbers-grid"></div></div>
        <div class="right-panel">
            <div class="big-ball-container"><div class="big-ball" id="current-ball">--</div></div>
            <div id="all-my-cartelas-container" style="width: 100%; display: flex; flex-direction: column; gap: 15px;"></div>
        </div>
    </div>

    <div class="bingo-overlay" id="bingo-screen">
        <div class="announcement-box">
            <h1 style="color: #00c853; margin: 0 0 10px 0; font-size: 36px;">BINGO! 🎉</h1>
            <p style="font-size: 16px; margin: 5px 0;">የአሸናፊነት አይነት፡ <span id="win-type" style="color: #ff5722; font-weight: bold;">-</span></p>
            <p style="font-size: 18px; margin: 5px 0;">አሸናፊ፡ <span id="winner-name" style="color: #ffc107; font-weight: bold;">-</span></p>
            <p style="font-size: 16px; margin: 5px 0; color: #007bff;">አሸናፊ ካርቴላ፦ <span id="winner-card-num" style="font-weight: bold;">-</span></p>
            <p style="font-size: 12px; color: #ffc107; margin-top: 15px; font-weight: bold;" id="restart-timer">በ 10 ሰከንድ ውስጥ ወደ ካርድ ምርጫ ይመለሳል...</p>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://bdej.pythonanywhere.com";

        Telegram.WebApp.ready();
        let telegramUser = Telegram.WebApp.initDataUnsafe?.user;
        let myUserId = telegramUser ? telegramUser.id : "local_test_" + Math.floor(Math.random() * 1000);
        let playerDisplayName = telegramUser ? telegramUser.first_name : "ተጫዋች";

        const numbersGrid = document.getElementById('numbers-grid');
        for (let i = 1; i <= 75; i++) {
            const cell = document.createElement('div');
            cell.className = 'board-cell';
            cell.innerText = i;
            cell.id = `board-num-${i}`;
            numbersGrid.appendChild(cell);
        }

        let selectedCards = JSON.parse(localStorage.getItem('selectedCardsList')) || [1];
        const cartelasContainer = document.getElementById('all-my-cartelas-container');

        selectedCards.forEach((cardNum, idx) => {
            let mockMatrix = generateMockMatrixForCard(cardNum);
            
            let cartelBox = document.createElement('div');
            cartelBox.className = 'cartel-box';
            
            let tableHTML = `
                <table class="bingo-table" id="table-card-${cardNum}">
                    <tr>
                        <th class="bingo-th" style="background:#007bff;">B</th>
                        <th class="bingo-th" style="background:#6f42c1;">I</th>
                        <th class="bingo-th" style="background:#e83e8c;">N</th>
                        <th class="bingo-th" style="background:#28a745;">G</th>
                        <th class="bingo-th" style="background:#fd7e14;">O <div class="cartela-label-top">CARTELA #${cardNum}</div></th>
                    </tr>
            `;
            
            for(let r=0; r<5; r++) {
                tableHTML += `<tr>`;
                for(let c=0; c<5; c++) {
                    let val = mockMatrix[r][c];
                    if(r===2 && c===2) {
                        tableHTML += `<td class="bingo-td matched" style="background-color:#00c853; color:white;">★</td>`;
                    } else {
                        tableHTML += `<td class="bingo-td">${val}</td>`;
                    }
                }
                tableHTML += `</tr>`;
            }
            tableHTML += `</table>`;
            cartelBox.innerHTML = tableHTML;
            cartelasContainer.appendChild(cartelBox);
        });

        function generateMockMatrixForCard(seed) {
            let matrix = [];
            for(let r=0; r<5; r++){
                matrix[r] = [];
                for(let c=0; c<5; c++){
                    matrix[r][c] = Math.floor(Math.random() * 15) + 1 + (c * 15);
                }
            }
            return matrix;
        }

        function connectToBackend() {
            fetch(`${SERVER_URL}/api/join`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: myUserId,
                    user_name: playerDisplayName,
                    card_num: selectedCards.join(", ")
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('my-wallet').innerText = data.wallet + " ETB";
                document.getElementById('live-players').innerText = data.players_count;
                document.getElementById('live-prize').innerText = data.derash + " ETB";
            });
        }

        connectToBackend();

        let allNumbers = Array.from({length: 75}, (_, i) => i + 1);
        let currentActiveNum = null;

        const callInterval = setInterval(() => {
            if (allNumbers.length === 0) { clearInterval(callInterval); return; }
            const randomIndex = Math.floor(Math.random() * allNumbers.length);
            const pickedNum = allNumbers.splice(randomIndex, 1)[0];
            document.getElementById('called-count').innerText = 75 - allNumbers.length;

            if (currentActiveNum) document.getElementById(`board-num-${currentActiveNum}`).className = 'board-cell active-past';
            currentActiveNum = pickedNum;
            document.getElementById('current-ball').innerText = pickedNum;
            document.getElementById(`board-num-${pickedNum}`).className = 'board-cell active-now';
            
            checkAndMatchAllCards(pickedNum);
        }, 3000);

        function checkAndMatchAllCards(num) {
            selectedCards.forEach(cardNum => {
                const table = document.getElementById(`table-card-${cardNum}`);
                const cells = table.getElementsByTagName('td');
                for (let cell of cells) {
                    if (parseInt(cell.innerText) === num) {
                        cell.classList.add('matched');
                    }
                }
                checkWinConditionsForTable(table, cardNum);
            });
        }

        function checkWinConditionsForTable(table, cardNum) {
            function isMarked(r, c) {
                const row = table.getElementsByTagName('tr')[r+1]; 
                const cell = row.getElementsByTagName('td')[c];
                return cell.classList.contains('matched') || cell.innerText === '★';
            }

            let won = false;
            let type = "";

            for (let r = 0; r < 5; r++) { if (isMarked(r,0) && isMarked(r,1) && isMarked(r,2) && isMarked(r,3) && isMarked(r,4)) { won = true; type = "Horizontal (አግድም)"; } }
            for (let c = 0; c < 5; c++) { if (isMarked(0,c) && isMarked(1,c) && isMarked(2,c) && isMarked(3,c) && isMarked(4,c)) { won = true; type = "Vertical (ወደታች)"; } }
            if (isMarked(0,0) && isMarked(1,1) && isMarked(2,2) && isMarked(3,3) && isMarked(4,4)) { won = true; type = "Diagonal (ሰያፍ)"; }
            if (isMarked(0,4) && isMarked(1,3) && isMarked(2,2) && isMarked(3,1) && isMarked(4,0)) { won = true; type = "Diagonal (ሰያፍ)"; }

            if(won) triggerBingoWin(type, cardNum);
        }

        function triggerBingoWin(winType, winningCard) {
            clearInterval(callInterval);

            fetch(`${SERVER_URL}/api/win`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: myUserId })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "won") {
                    document.getElementById('my-wallet').innerText = data.updated_wallet + " ETB";
                }
            });

            document.getElementById('bingo-screen').style.display = 'flex';
            document.getElementById('win-type').innerText = winType;
            document.getElementById('winner-name').innerText = playerDisplayName; 
            document.getElementById('winner-card-num').innerText = `#${winningCard}`; 
            
            let returnTime = 10;
            const returnInterval = setInterval(() => {
                returnTime--;
                document.getElementById('restart-timer').innerText = `በ ${returnTime} ሰከንድ ውስጥ ወደ ካርድ ምርጫ ይመለሳል...`;
                if (returnTime <= 0) {
                    clearInterval(returnInterval);
                    fetch(`${SERVER_URL}/api/restart`, { method: "POST" })
                    .then(() => { window.location.href = 'index.html'; });
                }
            }, 1000);
        }
    </script>
</body>
    </html>
