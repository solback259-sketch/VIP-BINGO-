<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP BINGO - ምርጫ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1540; color: white; text-align: center; margin: 0; padding: 15px; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 260px; overflow-y: auto; padding: 5px; background: #251f5c; border-radius: 12px; }
        .card-btn { background-color: #3d3580; color: white; border: none; padding: 12px 0; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        
        /* 🎨 የቀለም ህጎች */
        .card-btn.selected { background-color: #ff5722 !important; box-shadow: 0 0 8px #ff5722; }
        .card-btn.taken { background-color: #555 !important; color: #aaa; cursor: not-allowed; }
        
        .timer-box { font-size: 18px; font-weight: bold; color: white; background: #555; padding: 8px; border-radius: 8px; margin-bottom: 10px; }
        .timer-box.counting { background: #ff5722; }
        .mini-card { background: rgba(0,0,0,0.2); border: 1px solid #00c853; padding: 8px; margin-top: 8px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="welcome-box">
        <div class="timer-box" id="countdown-timer">ለመቁጠር ቢያንስ 2 ካርቴላ ይምረጡ</div>
    </div>

    <div class="grid-container" id="cards-grid"></div>

    <script>
        Telegram.WebApp.ready();
        const SERVER_URL = "https://bdej.pythonanywhere.com";
        let selectedCards = [];
        
        // 1. ሌሎች የያዟቸውን ካርቴላዎች ከServer ማምጣት
        function fetchTakenCards() {
            fetch(`${SERVER_URL}/api/taken_cards`)
            .then(res => res.json())
            .then(data => {
                renderGrid(data.taken_list);
            });
        }

        // 2. ሰሌዳውን መሳል (በተያዘ እና በነጻ ሁኔታ)
        function renderGrid(takenList) {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 200; i++) {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                btn.innerText = i;

                if (takenList.includes(i)) {
                    btn.classList.add('taken');
                    btn.disabled = true; // ሌሎች የያዟቸውን እንዳይነካ
                } else {
                    btn.onclick = () => toggleSelection(i, btn);
                }
                grid.appendChild(btn);
            }
        }

        function toggleSelection(num, btn) {
            if (selectedCards.includes(num)) {
                selectedCards = selectedCards.filter(c => c !== num);
                btn.classList.remove('selected');
            } else {
                if (selectedCards.length >= 3) return;
                selectedCards.push(num);
                btn.classList.add('selected');
            }
            checkTimer();
        }

        // ⏱️ የቆጣሪ ህግ (2 ካርቴላ ሲሆን ይጀምራል)
        let timerStarted = false;
        function checkTimer() {
            if (selectedCards.length >= 2 && !timerStarted) {
                timerStarted = true;
                let timeLeft = 40;
                document.getElementById('countdown-timer').className = 'timer-box counting';
                const interval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('countdown-timer').innerText = `ጨዋታው ለመጀመር፡ ${timeLeft} ሰከንድ`;
                    if(timeLeft <= 0) { clearInterval(interval); startGame(); }
                }, 1000);
            }
        }

        function startGame() {
            localStorage.setItem('selectedCardsList', JSON.stringify(selectedCards));
            window.location.href = 'game.html';
        }

        fetchTakenCards();
    </script>
</body>
</html>
