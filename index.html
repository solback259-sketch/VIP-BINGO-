<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP BINGO - ምርጫ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1540; color: white; text-align: center; margin: 0; padding: 15px; }
        .welcome-box { background: #251f5c; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #3d3580; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 400px; overflow-y: auto; padding: 5px; background: #251f5c; border-radius: 12px; }
        .card-btn { background-color: #3d3580; color: white; border: none; padding: 12px 0; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .card-btn.selected { background-color: #ff5722 !important; box-shadow: 0 0 8px #ff5722; }
        .action-btn { background: linear-gradient(135deg, #00c853, #009624); color: white; border: none; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; margin-top: 15px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div class="welcome-box">
        <h3 style="margin: 5px 0; color: #ffc107;">እንኳን ደህና መጡ! 🎁</h3>
        <p style="margin: 5px 0; font-size: 12px;">ለአዲስ ተጫዋች 10 ብር ተሰጥቶዎታል። እስከ 3 ካርቴላ መምረጥ ይችላሉStack።</p>
        <p style="margin: 5px 0; font-size: 13px; font-weight: bold; color: #00c853;">የተመረጡ፦ <span id="selected-count">0/3</span></p>
    </div>

    <div class="grid-container" id="cards-grid"></div>

    <button class="action-btn" id="start-game-btn" onclick="goToGame()">ወደ ጨዋታው ግባ (BET 10 ETB)</button>

    <script>
        Telegram.WebApp.ready();
        
        if (!localStorage.getItem('vip_bingo_wallet')) {
            localStorage.setItem('vip_bingo_wallet', '10'); 
        }

        const grid = document.getElementById('cards-grid');
        let selectedCards = [];

        for (let i = 1; i <= 200; i++) {
            const btn = document.createElement('button');
            btn.className = 'card-btn';
            btn.innerText = i;
            btn.onclick = () => toggleCardSelection(i, btn);
            grid.appendChild(btn);
        }

        function toggleCardSelection(num, buttonElement) {
            const index = selectedCards.indexOf(num);
            
            if (index > -1) {
                selectedCards.splice(index, 1);
                buttonElement.classList.remove('selected');
            } else {
                if (selectedCards.length >= 3) {
                    Telegram.WebApp.showAlert("በአንድ ጊዜ ከ 3 ካርቴላ በላይ መምረጥ አይችሉም!");
                    return;
                }
                selectedCards.push(num);
                buttonElement.classList.add('selected');
            }

            document.getElementById('selected-count').innerText = `${selectedCards.length}/3`;
            const startBtn = document.getElementById('start-game-btn');
            if (selectedCards.length > 0) {
                startBtn.style.display = 'block';
            } else {
                startBtn.style.display = 'none';
            }
        }

        function goToGame() {
            localStorage.setItem('selectedCardsList', JSON.stringify(selectedCards));
            window.location.href = 'game.html';
        }
    </script>
</body>
</html>
